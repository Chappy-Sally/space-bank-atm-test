<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>宇宙銀行ATM｜チャッピー＆サリー</title>

  <link rel="icon" href="icon.jpg" />
  <link rel="apple-touch-icon" href="icon.jpg" />
  <meta name="theme-color" content="#0a1030" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="宇宙銀行ATM" />

  <style>
    :root{
      --bg1:#050712;
      --bg2:#0a1030;
      --card:#0d1326cc;
      --card2:#0f1730cc;
      --line:#ffffff1a;
      --text:#eef2ff;
      --muted:#b7c0ffcc;
      --gold:#f7d77a;
      --gold2:#c89b31;
      --danger:#7c3c4b;
      --shadow:0 18px 50px rgba(0,0,0,.42);
      --radius:24px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 20% 0%, #1a1f44 0%, transparent 55%),
        radial-gradient(1000px 700px at 80% 20%, #2a164c 0%, transparent 60%),
        radial-gradient(900px 700px at 40% 100%, #0b2b45 0%, transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:10px 10px 18px;
    }

    .app{
      width:min(430px, 100%);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:11px 12px;
      background: linear-gradient(180deg, #101833cc, #0a0f22cc);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff 0%, var(--gold) 35%, #b98b2a 100%);
      box-shadow:0 0 18px rgba(247,215,122,.6);
      flex:0 0 auto;
    }

    .brandtext{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }

    .brandtext b{
      font-size:14px;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brandtext span{
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      border:1px solid var(--line);
      background:linear-gradient(180deg, #182048cc, #0f1633cc);
      color:var(--text);
      padding:9px 10px;
      border-radius:999px;
      font-size:12px;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
      backdrop-filter:blur(10px);
      user-select:none;
      white-space:nowrap;
    }

    .pill.gold{
      border-color:rgba(247,215,122,.38);
      box-shadow:0 10px 32px rgba(247,215,122,.12);
    }

    .card{
      background:linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
    }

    .hero{
      position:relative;
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#0b1024;
      aspect-ratio:16 / 8.8;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.02);
      filter:saturate(1.05) contrast(1.05);
    }

    .hero .label{
      position:absolute;
      left:10px;
      top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.25));
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(8px);
      max-width:calc(100% - 20px);
      box-shadow:0 18px 55px rgba(0,0,0,.35);
    }

    .label b{
      display:block;
      font-size:15px;
      margin-bottom:4px;
    }

    .label span{
      font-size:11px;
      color:rgba(255,255,255,.82);
      line-height:1.45;
    }

    .hero .mascot-peek{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:32%;
      pointer-events:none;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.26) 55%, rgba(0,0,0,.42));
    }

    .gateAction{
      margin-top:10px;
      display:flex;
      justify-content:center;
    }

    .bigBtn{
      width:100%;
      padding:14px 12px;
      border-radius:16px;
      border:1px solid rgba(247,215,122,.28);
      background:linear-gradient(180deg, rgba(247,215,122,.18), rgba(247,215,122,.08));
      color:var(--text);
      font-size:15px;
      cursor:pointer;
      box-shadow:0 18px 55px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .bigBtn .paw{
      width:18px;
      height:18px;
      display:inline-grid;
      place-items:center;
    }

    .atmWrap{
      display:none;
      margin-top:10px;
      gap:10px;
    }

    .sectionTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:8px;
      margin-bottom:6px;
    }

    .badge{
      font-size:12px;
      color:rgba(255,255,255,.86);
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      padding:7px 10px;
      border-radius:999px;
      display:inline-flex;
      gap:8px;
      align-items:center;
      user-select:none;
    }

    .badge .miniDot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:rgba(247,215,122,.96);
      box-shadow:0 0 18px rgba(247,215,122,.45);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .pinBox{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      border-radius:16px;
      padding:14px;
      min-height:72px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }

    .pinBox .small{
      font-size:12px;
      color:var(--muted);
    }

    .pinBox .pin{
      font-size:20px;
      letter-spacing:.18em;
      font-weight:800;
    }

    .enterBtn{
      width:100%;
      min-height:72px;
      border:1px solid rgba(47,143,122,.45);
      background:linear-gradient(180deg, rgba(47,143,122,.30), rgba(47,143,122,.14));
      border-radius:16px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      font-weight:900;
      color:#fff;
      box-shadow:0 12px 35px rgba(0,0,0,.25);
    }

    .keypad{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin-top:8px;
    }

    .key{
      padding:16px 0;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
      box-shadow:0 12px 35px rgba(0,0,0,.25);
    }

    .key.danger{
      background:linear-gradient(180deg, rgba(124,60,75,.35), rgba(124,60,75,.18));
      border-color:rgba(124,60,75,.5);
      font-size:17px;
    }

    .hintLine{
      margin-top:8px;
      font-size:11px;
      color:var(--muted);
      line-height:1.5;
    }

    .rewardStage{
      display:none;
      margin-top:10px;
      position:relative;
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--line);
      background:
        radial-gradient(900px 520px at 50% 35%, rgba(247,215,122,.18), transparent 65%),
        radial-gradient(700px 500px at 20% 0%, rgba(160,120,255,.18), transparent 60%),
        radial-gradient(900px 600px at 80% 0%, rgba(80,200,255,.14), transparent 65%),
        linear-gradient(180deg, rgba(7,10,25,.95), rgba(10,16,42,.95));
      box-shadow:var(--shadow);
    }

    .rewardTop{
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .rewardTitleWrap b{
      font-size:15px;
    }

    .rewardTitleWrap span{
      font-size:12px;
      color:var(--muted);
    }

    .rewardArea{
      position:relative;
      height:320px;
      overflow:hidden;
      border-top:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .rewardControls{
      padding:16px 12px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .rewardControlBtn{
      width:100%;
      padding:13px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      color:var(--text);
      cursor:pointer;
      font-size:14px;
      font-weight:800;
    }

    .rewardControlLinks{
      text-align:center;
      font-size:12px;
      opacity:0.82;
    }

    .rewardControlLinks span{
      cursor:pointer;
      user-select:none;
    }

    .sparkle{
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.9) 40%, transparent 41%),
        radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.75) 40%, transparent 41%),
        radial-gradient(1.5px 1.5px at 45% 60%, rgba(255,255,255,.8) 40%, transparent 41%),
        radial-gradient(1.8px 1.8px at 85% 55%, rgba(255,255,255,.7) 40%, transparent 41%),
        radial-gradient(1.6px 1.6px at 30% 80%, rgba(255,255,255,.75) 40%, transparent 41%);
      opacity:.55;
      animation:twinkle 2.6s infinite ease-in-out alternate;
    }

    @keyframes twinkle{
      from{ opacity:.35; transform:translateY(0px); }
      to{ opacity:.72; transform:translateY(-2px); }
    }

    .moneyRain{
      position:absolute;
      top:-40px;
      font-size:30px;
      pointer-events:none;
      z-index:8;
      animation:moneyFall 2.2s linear forwards;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.28));
    }

    @keyframes moneyFall{
      0%{ transform:translateY(-20px) rotate(0deg); opacity:0; }
      10%{ opacity:1; }
      100%{ transform:translateY(360px) rotate(18deg); opacity:0; }
    }

    .mainRewardWrap{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:min(72%, 260px);
      z-index:20;
      animation:rewardPop .45s ease-out forwards;
      text-align:center;
    }

    .mainRewardImage{
      width:90%;
      max-width:220px;
      height:auto;
      display:block;
      margin:0 auto;
      border-radius:20px;
    }

    .mainRewardTitle{
      margin-top:8px;
      font-size:15px;
      font-weight:800;
      color:var(--text);
      text-shadow:0 2px 8px rgba(0,0,0,.35);
      line-height:1.45;
    }

    .mainRewardValue{
      margin-top:6px;
      font-size:13px;
      color:var(--gold);
      font-weight:800;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    @keyframes rewardPop{
      0%{ opacity:0; transform:translate(-50%, -44%) scale(.88); }
      100%{ opacity:1; transform:translate(-50%, -50%) scale(1); }
    }

    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9998;
    }

    .modal{
      width:min(420px, 100%);
      background:linear-gradient(180deg, rgba(15,23,48,.96), rgba(10,14,30,.96));
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:14px;
      max-height:88vh;
      overflow:auto;
    }

    .modal h3{
      margin:6px 6px 10px;
      font-size:16px;
    }

    .modal p{
      margin:0 6px 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .modal .modalBtns{
      display:flex;
      gap:10px;
      padding:6px;
      flex-wrap:wrap;
    }

    .modal .modalBtns button{
      flex:1;
      min-width:120px;
      cursor:pointer;
      border-radius:16px;
      padding:12px 10px;
      font-weight:800;
      color:var(--text);
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
    }

    .modal .modalBtns button.gold{
      border-color:rgba(247,215,122,.35);
      background:rgba(247,215,122,.12);
    }

    .passbookCard{
      margin:8px 6px 12px;
      border-radius:20px;
      border:1px solid rgba(247,215,122,.25);
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.25), transparent 18%),
        linear-gradient(180deg, #f8e6a0, #e1c457);
      color:#5f4315;
      box-shadow:0 18px 40px rgba(0,0,0,.28);
    }

    .passbookHead{
      padding:16px 16px 10px;
      border-bottom:1px solid rgba(95,67,21,.18);
      font-weight:900;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .passbookHead .left{
      font-size:16px;
      line-height:1.35;
    }

    .passbookHead .right{
      text-align:right;
      font-size:12px;
      line-height:1.5;
    }

    .passbookBody{
      padding:16px;
      background:rgba(255,255,255,.38);
    }

    .passbookBalanceLabel{
      font-size:13px;
      margin-bottom:8px;
      font-weight:700;
    }

    .passbookBalance{
      font-size:26px;
      font-weight:900;
      letter-spacing:.02em;
      line-height:1.3;
      word-break:break-all;
    }

    .passbookSub{
      margin-top:8px;
      font-size:12px;
      line-height:1.6;
      color:#7a5a1f;
    }

    .history{
      margin:10px 6px 0;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
      background:rgba(255,255,255,.04);
    }

    .history .head{
      padding:12px 14px;
      font-size:13px;
      font-weight:800;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .historyList{
      padding:8px 0;
    }

    .todayIncome{
      text-align:center;
      font-size:14px;
      color:#8b5a2b;
      margin:10px 0;
      font-weight:bold;
    }

    .historyItem{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      font-size:12px;
      border-top:1px solid rgba(255,255,255,.05);
    }

    .historyItem:first-child{
      border-top:none;
    }

    .historyItem .name{
      color:#fff;
      flex:1;
      min-width:0;
      word-break:break-word;
    }

    .historyItem .val{
      color:var(--gold);
      font-weight:900;
      white-space:nowrap;
    }

    .emptyState{
      padding:14px;
      font-size:12px;
      color:var(--muted);
    }

    .collectionGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .collectionItem{
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:6px;
      text-align:center;
      background:rgba(255,255,255,.05);
    }

    .collectionItem img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:10px;
      display:block;
    }

    .collectionName{
      font-size:11px;
      margin-top:4px;
      color:var(--text);
      line-height:1.4;
    }

    .gateMode .topbar{
      display:none;
    }

    @media (max-width:430px){
      .rewardArea{ height:260px; }
      .mainRewardWrap{ width:min(70%, 240px); }
      .top-actions{ gap:6px; }
      .pill{ font-size:11px; padding:8px 9px; }
    }

    .buyAvailable{
      box-shadow:0 0 12px gold;
      transform:scale(1.05);
    }
    
/* 🌸桜エフェクト */
.sakura{
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear forwards;
  pointer-events: none;
}

.sakura::before{
  content: "🌸";
}

@keyframes fall{
  to{
    transform: translateY(100vh);
  }
}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div class="brandtext">
          <b>宇宙銀行ATM</b>
          <span>チャッピー＆サリー</span>
        </div>
      </div>

      <div class="top-actions">
        <button class="pill gold" id="btnLottery">宝くじ🎯</button>
        <button class="pill gold" id="btnPassbookTop">通帳を見る</button>
        <button class="pill gold" id="btnShop">購入</button>
        <button class="pill gold" id="btnHomeTop">HOME</button>
      </div>
    </div>

    <div class="card">
      <div class="hero">
        <img id="heroImg" alt="宇宙銀行" />
        <div class="label" id="heroLabel">
          <b id="heroTitle">ようこそ、宇宙銀行へ</b>
          <span id="heroSub">🐾🔘で入店してね。</span>
        </div>
        <div class="mascot-peek"></div>
      </div>

      <div class="gateAction" id="gateAction">
        <button class="bigBtn" id="btnEnter">
          <span class="paw">🐾</span>
          <span>宇宙銀行に入る🐾</span>
          <span style="opacity:.7">🔘</span>
        </button>
      </div>

      <div class="atmWrap" id="atmWrap">
        <div class="sectionTitle">
          <div class="badge"><span class="miniDot"></span><span>ATM</span></div>
          <div class="badge">PIN: <span id="pinDots">◯ ◯ ◯ ◯</span></div>
        </div>

        <div class="row">
          <div class="pinBox">
            <div class="small">暗証番号（4桁）</div>
            <div class="pin" id="pinView">----</div>
          </div>

          <button class="enterBtn" id="btnEnterReward" aria-label="受け取り開始">↩</button>
        </div>

        <div class="keypad" id="keypad">
          <button class="key" data-k="1">1</button>
          <button class="key" data-k="2">2</button>
          <button class="key" data-k="3">3</button>
          <button class="key" data-k="4">4</button>
          <button class="key" data-k="5">5</button>
          <button class="key" data-k="6">6</button>
          <button class="key" data-k="7">7</button>
          <button class="key" data-k="8">8</button>
          <button class="key" data-k="9">9</button>
          <button class="key danger" data-k="clear">けす</button>
          <button class="key" data-k="0">0</button>
        </div>

        <div class="hintLine" id="hintLine">
          ・暗証番号は4桁<br>
          ・好きな4桁を入力して ↩ を押すと受け取り開始
        </div>
      </div>

      <div class="rewardStage" id="rewardStage">
        <div class="sparkle"></div>

        <div class="rewardTop">
          <div class="rewardTitleWrap">
            <b id="rewardTitle">REWARD</b><br>
            <span id="rewardSub">受取り増す🐶🐾</span>
          </div>
          <button class="pill" id="btnBackATM">ATMへ戻る</button>
        </div>

        <div class="rewardArea" id="rewardArea"></div>

        <div class="rewardControls">
          <button class="rewardControlBtn" id="btnRewardAgain">もう一回受け取る</button>
          <div class="rewardControlLinks">
            <span id="btnNotice">注意事項</span>
            &nbsp;｜&nbsp;
            <span id="btnReset">リセット</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="collectionCard">
      <h3 style="margin:6px 6px 10px;">宇宙コレクション</h3>
      <div id="collectionGrid" class="collectionGrid"></div>
    </div>
  </div>

  <div class="modalBack" id="passbookBack">
    <div class="modal">
      <h3>宇宙銀行 通帳</h3>

      <div class="passbookCard">
        <div class="passbookHead">
          <div class="left">
            宇宙銀行<br>
            スーパーミラクル口座 通帳
          </div>
          <div class="right">
            支店番号 358<br>
            本店
          </div>
        </div>

        <div class="passbookBody">
          <div class="passbookBalanceLabel">あなたの残高</div>
          <div class="passbookBalance" id="passbookBalance">¥0</div>
          <div class="todayIncome">

    const BALANCE_KEY = "spaceBankBalance_v1";

      { id:"jet", name:"ジェット", price:300000000, src:"images/cosmic_private_jet_trip.png" },

    const app = document.getElementById("app");
    const heroImg = document.getElementById("heroImg");
    const heroLabel = document.getElementById("heroLabel");
    const heroTitle = document.getElementById("heroTitle");
    const heroSub = document.getElementById("heroSub");
    const gateAction = document.getElementById("gateAction");
    const btnEnter = document.getElementById("btnEnter");

    const atmWrap = document.getElementById("atmWrap");
    const pinView = document.getElementById("pinView");
    const pinDots = document.getElementById("pinDots");
    const keypad = document.getElementById("keypad");
    const btnEnterReward = document.getElementById("btnEnterReward");
    const hintLine = document.getElementById("hintLine");

    const rewardStage = document.getElementById("rewardStage");
    const rewardArea = document.getElementById("rewardArea");
    const rewardTitle = document.getElementById("rewardTitle");

    const btnRewardAgain = document.getElementById("btnRewardAgain");

    const btnNotice = document.getElementById("btnNotice");
    const btnReset = document.getElementById("btnReset");

    const btnHomeTop = document.getElementById("btnHomeTop");
    const btnPassbookTop = document.getElementById("btnPassbookTop");
    const btnShop = document.getElementById("btnShop");

    const passbookBack = document.getElementById("passbookBack");
    const passbookClose = document.getElementById("passbookClose");
    const passbookBalance = document.getElementById("passbookBalance");
    const historyList = document.getElementById("historyList");
    const btnCopyBalance = document.getElementById("btnCopyBalance");

    let mode = "gate";
    let pin = "";
    let rewardTimers = [];

    function cacheBust(path){
      return path + "?v=" + Date.now();
    }

    function formatYen(num){
      return "¥" + Number(num || 0).toLocaleString("ja-JP");
    }

    function getBalance(){
      return Number(localStorage.getItem(BALANCE_KEY) || 0);
    }

    function setBalance(num){
      localStorage.setItem(BALANCE_KEY, String(num));
    }

    function getHistory(){
      try{
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      }catch(err){
        return [];
      }
    }

    function setHistory(arr){
      localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
    }

    function addHistory(item){
      const list = getHistory();
      list.unshift(item);
      setHistory(list.slice(0, 20));
    }

    function addToBalance(value, title){
      const current = getBalance();
      const next = current + value;
      setBalance(next);

      addHistory({
        title,
        value,
        date: new Date().toLocaleString("ja-JP")
      });

      return next;
    }

    function getTodayIncome(){
      const list = getHistory();
      const today = new Date().toLocaleDateString("ja-JP");
      return list
        .filter(item => item.value > 0 && item.date && item.date.startsWith(today))
        .reduce((sum, item) => sum + item.value, 0);
    }

    function updateTodayIncome(){
      const todayIncomeEl = document.getElementById("todayIncome");
      if(todayIncomeEl){
        todayIncomeEl.textContent = "+" + formatYen(getTodayIncome());
      }
    }

    function getCollection(){
      try{
        return JSON.parse(localStorage.getItem(COLLECTION_KEY) || "[]");
      }catch(err){
        return [];
      }
    }

    function setCollection(arr){
      localStorage.setItem(COLLECTION_KEY, JSON.stringify(arr));
    }

    function renderCollection(){
      const grid = document.getElementById("collectionGrid");
      if(!grid) return;

      const owned = getCollection();
      grid.innerHTML = "";

      shopItems.forEach(item => {
        const box = document.createElement("div");
        box.className = "collectionItem";

        const img = document.createElement("img");
        img.src = item.src;

        const name = document.createElement("div");
        name.className = "collectionName";

        if(owned.includes(item.id)){
          name.textContent = item.name;
        }else{
          img.style.opacity = "0.2";
          name.textContent = "？？？";
        }

        box.appendChild(img);
        box.appendChild(name);
        grid.appendChild(box);
      });
    }

    function buyItem(item){
      const balance = getBalance();

      if(balance < item.price){
        alert("残高が足りないよ🐾");
        return;
      }

      const owned = getCollection();

      if(owned.includes(item.id)){
        alert("もう持ってるよ✨");
        return;
      }

      setBalance(balance - item.price);
      owned.push(item.id);
      setCollection(owned);

      addHistory({
        title: item.name + " を購入",
        value: -item.price,
        date: new Date().toLocaleString("ja-JP")
      });

      renderCollection();
      updateTodayIncome();
      alert("✨宇宙銀行ATM✨\n\n" + item.name + " を購入しました💰");
    }

    function openShop(){
      const itemsText = shopItems
        .map((item, index) =>
          `${index + 1}. ${item.name}\n　 ${formatYen(item.price)}`
        )
        .join("\n\n");

      const num = prompt(
        "宇宙銀行ショッピング🌈\n欲しいアイテムの番号を入力してね\n\n" + itemsText
      );

      const item = shopItems[Number(num) - 1];

      if(item){
        buyItem(item);
      }
    }
    function renderPassbook(){
      passbookBalance.textContent = formatYen(getBalance());
      updateTodayIncome();

      const list = getHistory();
      historyList.innerHTML = "";

      if(!list.length){
        historyList.innerHTML = '<div class="emptyState">まだ受け取り履歴はないよ🐾</div>';
        return;
      }

      list.forEach(item => {
        const row = document.createElement("div");
        row.className = "historyItem";

        const name = document.createElement("div");
        name.className = "name";
        name.innerHTML = `${item.title}<br><span style="color:var(--muted);font-size:11px;">${item.date}</span>`;

        const val = document.createElement("div");
        val.className = "val";

        if(item.value < 0){
          val.textContent = "-" + formatYen(Math.abs(item.value)).replace("¥", "¥");
        }else{
          val.textContent = "+" + formatYen(item.value).replace("¥", "¥");
        }

        row.appendChild(name);
        row.appendChild(val);
        historyList.appendChild(row);
      });
    }

    function openPassbook(){
      renderPassbook();
      passbookBack.style.display = "flex";
    }

    function closePassbook(){
      passbookBack.style.display = "none";
    }

    function setHero(src, title, sub){
      heroImg.src = cacheBust(src);
      heroTitle.textContent = title;
      heroSub.textContent = sub;
    }

    function clearTimers(){
      rewardTimers.forEach(t => clearTimeout(t));
      rewardTimers = [];
    }

    function setMode(next){
      clearTimers();
      mode = next;

      if(mode === "gate"){
        app.classList.add("gateMode");
        heroLabel.style.display = "none";
        setHero(IMG.gate, "", "");
        gateAction.style.display = "flex";
        atmWrap.style.display = "none";
        rewardStage.style.display = "none";
        pin = "";
        updatePinUI();
      }

      if(mode === "atm"){
        app.classList.remove("gateMode");
        heroLabel.style.display = "block";
        setHero(IMG.atm, "宇宙銀行ATM", "好きな4桁を入力してね。");
        gateAction.style.display = "none";
        atmWrap.style.display = "block";
        rewardStage.style.display = "none";
        updatePinUI();
      }

      if(mode === "reward"){
        app.classList.remove("gateMode");
        heroLabel.style.display = "none";
        setHero(IMG.gate, "", "");
        gateAction.style.display = "none";
        atmWrap.style.display = "none";
        rewardStage.style.display = "block";
      }
    }

    function updatePinUI(){
      pinView.textContent = (pin + "----").slice(0, 4);
      const dots = [];
      for(let i = 0; i < 4; i++){
        dots.push(i < pin.length ? "●" : "◯");
      }
      pinDots.textContent = dots.join(" ");
      btnEnterReward.style.opacity = pin.length === 4 ? "1" : ".55";
      hintLine.innerHTML = "・暗証番号は4桁<br>・好きな4桁を入力して ↩ を押すと受け取り開始";
    }

    function clearRewardArea(){
      rewardArea.innerHTML = "";
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      rewardArea.appendChild(sparkle);
    }

    function moneyRainStage(){
      const icons = ["💴", "🪙", "💴", "🪙", "💰"];
      for(let i = 0; i < 24; i++){
        const timer = setTimeout(() => {
          const el = document.createElement("div");
          el.className = "moneyRain";
          el.textContent = icons[Math.floor(Math.random() * icons.length)];
          el.style.left = Math.random() * 90 + "%";
          rewardArea.appendChild(el);
          setTimeout(() => el.remove(), 2400);
        }, i * 75);
        rewardTimers.push(timer);
      }
    }

    function showRewardImage(reward){
      rewardArea.innerHTML = "";

      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      rewardArea.appendChild(sparkle);

      const wrap = document.createElement("div");
      wrap.className = "mainRewardWrap";

      const img = document.createElement("img");
      img.src = cacheBust(reward.src);
      img.alt = reward.title;
      img.className = "mainRewardImage";

      const title = document.createElement("div");
      title.className = "mainRewardTitle";

      const value = document.createElement("div");
      value.className = "mainRewardValue";

      if(reward.src.includes("cosmic_bank_office.png")){

        img.src = cacheBust("images/chappy_sally_invitation.png");
        title.textContent = "🌈宇宙銀行から招待状が届きました🌈";
        value.textContent = "頭取ルームへご案内します✨";

        setTimeout(() => {
          img.src = cacheBust("images/cosmic_bank_office.png");
          moneyRainStage();
          title.textContent = "🌈宇宙銀行頭取に招待されました🌈 ご財増しました✨";
          value.textContent = "888,888,888,888";
        }, 1500);

      }else{

        title.textContent = reward.title;
        value.textContent = "+" + formatYen(reward.value);

        if(reward.chestDrop){
          setTimeout(() => {
            img.src = cacheBust("images/cosmic_Takarabako.png");
            title.textContent = "邪鬼が宝箱を落として行った！";
            value.textContent = "+" + formatYen(7777777);
            addToBalance(7777777, "邪鬼が宝箱を落として行った！");
            updateTodayIncome();
          }, 2200);
        }

      }

      wrap.appendChild(img);
      wrap.appendChild(title);
      wrap.appendChild(value);
      rewardArea.appendChild(wrap);
    // 🌸桜シリーズだけ花びら
if(reward.src && reward.src.includes("ucyu")){
  showSakura();
  }
}

// 🌸桜エフェクト
function showSakura(){
  for(let i=0; i<20; i++){
    const petal = document.createElement("div");
    petal.className = "sakura";

    petal.style.left = Math.random()*100 + "vw";
    petal.style.animationDuration = (2 + Math.random()*3) + "s";

    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 4000);
  }
}    
    
    function getRandomReward(list){
      if(!list || !list.length) return null;

      if(list[0].chance == null){
        return list[Math.floor(Math.random() * list.length)];
      }

      const totalChance = list.reduce((sum, item) => sum + item.chance, 0);
      let random = Math.random() * totalChance;

      for(const item of list){
        if(random < item.chance){
          return item;
        }
        random -= item.chance;
      }

      return list[0];
    }

    function startRewardFlow(){
      if(pin.length !== 4){
        hintLine.innerHTML = "・暗証番号を4桁入力してね";
        return;
      }

      playRewardSequence();
    }

    function playRewardSequence(){
      setMode("reward");
      clearRewardArea();

      rewardTitle.textContent = "REWARD";
      rewardSub.textContent = "受取り増す🐶🐾";

      const moneyReward = getRandomReward(IMG.moneyRewards);
      const bonusReward = getRandomReward(IMG.bonusRewards);

      addToBalance(moneyReward.value, moneyReward.title);
      addToBalance(bonusReward.value, bonusReward.title);
      updateTodayIncome();

      rewardTimers.push(setTimeout(() => {
        moneyRainStage();
      }, 450));

      rewardTimers.push(setTimeout(() => {
        rewardSub.textContent = "金額の受け取り完了だよ💴";
        showRewardImage(moneyReward);
      }, 1600));

      rewardTimers.push(setTimeout(() => {
        rewardSub.textContent = "さらにごほうびが届いたよ✨";
        showRewardImage(bonusReward);
      }, 4200));
    }

    function showNotice(){
      alert(
        "✨ご利用について✨\n\n" +
        "このアプリは豊かさを楽しく体験するための無料エンタメアプリです。\n" +
        "実際のお金の入金や金融サービスではありません。\n\n" +
        "販売・転載・改変しての再配布はご遠慮ください。\n" +
        "本アプリの利用によって生じた結果について責任を負いかねます。"
      );
    }

    function resetBank(){
      if(confirm("宇宙銀行口座をリセットしますか？")){
        localStorage.removeItem(BALANCE_KEY);
        localStorage.removeItem(HISTORY_KEY);
        localStorage.removeItem(COLLECTION_KEY);
        location.reload();
      }
    }

    btnEnter.addEventListener("click", () => {
      setMode("atm");
    });

    btnEnterReward.addEventListener("click", startRewardFlow);

    keypad.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if(!b) return;

      const k = b.dataset.k;
      if(k === "clear"){
        pin = "";
        updatePinUI();
        return;
      }

      if(pin.length < 4){
        pin += k;
        updatePinUI();
      }
    });

    btnBackATM.addEventListener("click", () => {
      setMode("atm");
    });

    btnRewardAgain.addEventListener("click", () => {
      playRewardSequence();
    });

    btnPassbookTop.addEventListener("click", openPassbook);

    passbookClose.addEventListener("click", closePassbook);

    passbookBack.addEventListener("click", (e) => {
      if(e.target === passbookBack){
        closePassbook();
      }
    });

    btnHomeTop.addEventListener("click", () => {
      setMode("gate");
    });

    btnNotice.addEventListener("click", showNotice);
    btnReset.addEventListener("click", resetBank);

    btnCopyBalance.addEventListener("click", async () => {
      const text = "宇宙銀行の残高は " + formatYen(getBalance()) + " だよ✨";
      try{
        await navigator.clipboard.writeText(text);
        btnCopyBalance.textContent = "残高をコピーしたよ";
        setTimeout(() => {
          btnCopyBalance.textContent = "残高をチェック";
        }, 1600);
      }catch(err){
        btnCopyBalance.textContent = "残高は " + formatYen(getBalance());
        setTimeout(() => {
          btnCopyBalance.textContent = "残高をチェック";
        }, 1600);
      }
    });

    btnShop.addEventListener("click", () => {
      openShop();
    });
    heroImg.addEventListener("error", () => {
      console.warn("HERO画像が見つからないかも：", heroImg.src);
    });

    renderCollection();
    updateTodayIncome();
    setMode("gate");
  </script>
